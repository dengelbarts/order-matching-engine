name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu GCC
            os: ubuntu-22.04
            cc: gcc
            cxx: g++
          - name: Ubuntu Clang
            os: ubuntu-22.04
            cc: clang
            cxx: clang++
          - name: macOS Clang
            os: macos-latest
            cc: clang
            cxx: clang++

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Gateway self-test
        if: runner.os == 'Linux'
        run: |
          ./build/ome_main --port 9001 &
          GW_PID=$!
          sleep 1
          python3 demo/fix_client.py --port 9001 --self-test
          STATUS=$?
          kill $GW_PID 2>/dev/null || true
          wait $GW_PID 2>/dev/null || true
          exit $STATUS
